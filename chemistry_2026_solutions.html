<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chem 2026">
<meta name="theme-color" content="#080c14">
<title>Chemistry 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root{
  --ink:#080c14;
  --ink2:#0f1520;
  --ink3:#1a2335;
  --line:rgba(255,255,255,.08);
  --line2:rgba(255,255,255,.14);
  --tx:#e8edf7;
  --tx2:#7a8fad;
  --tx3:#3d5070;
  --amber:#f59e0b;
  --amber-d:rgba(245,158,11,.14);
  --cyan:#06d6c7;
  --cyan-d:rgba(6,214,199,.12);
  --lime:#84cc16;
  --rose:#fb7185;
  --violet:#a78bfa;
  --sky:#38bdf8;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --bar-h:60px;
  --hdr-h:58px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Sora',sans-serif;
  background:var(--ink);color:var(--tx);
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;
}

/* ── SCROLLABLE AREA ── */
.screen{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding-bottom:calc(var(--bar-h) + var(--safe-b) + 16px);
}
.screen::-webkit-scrollbar{display:none}

/* ── STATUS BAR SPACER ── */
.status-space{height:var(--safe-t);background:var(--ink)}

/* ── TOP BAR ── */
.topbar{
  height:var(--hdr-h);
  background:rgba(8,12,20,.95);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;
  padding:0 16px;gap:10px;
  flex-shrink:0;position:relative;z-index:50;
}
.topbar-back{
  width:36px;height:36px;border-radius:10px;
  background:var(--ink3);border:1px solid var(--line2);
  display:none;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;flex-shrink:0;
}
.topbar-back.vis{display:flex}
.topbar-title{
  font-family:'Sora',sans-serif;
  font-size:16px;font-weight:700;
  flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.topbar-title small{font-size:11px;font-weight:500;color:var(--tx2);display:block;margin-top:1px}
.topbar-pill{
  background:var(--amber-d);border:1px solid rgba(245,158,11,.22);
  color:var(--amber);border-radius:20px;
  padding:4px 11px;font-size:11px;font-weight:700;
  font-family:'Space Mono',monospace;flex-shrink:0;
}

/* ── SEARCH BAR ── */
.searchbar{
  padding:10px 14px;
  background:rgba(8,12,20,.9);
  border-bottom:1px solid var(--line);
  flex-shrink:0;
}
.search-wrap{
  display:flex;align-items:center;gap:10px;
  background:var(--ink3);border:1px solid var(--line2);
  border-radius:12px;padding:0 14px;height:42px;
  transition:border-color .2s;
}
.search-wrap:focus-within{border-color:rgba(245,158,11,.4)}
.search-ico{font-size:15px;color:var(--tx3);flex-shrink:0}
.search-wrap input{
  flex:1;background:none;border:none;outline:none;
  font-family:'Sora',sans-serif;font-size:13.5px;
  color:var(--tx);caret-color:var(--amber);
  -webkit-appearance:none;
}
.search-wrap input::placeholder{color:var(--tx3)}
.search-clear{
  font-size:14px;color:var(--tx3);cursor:pointer;
  display:none;padding:4px;
}
.search-clear.vis{display:block}

/* ── HOME SCREEN ── */
#homeScreen{}
.home-hero{
  margin:16px 14px 0;
  background:linear-gradient(145deg,var(--ink2),var(--ink3));
  border:1px solid var(--line2);border-radius:20px;
  padding:22px 20px;position:relative;overflow:hidden;
}
.home-hero::after{
  content:'';position:absolute;
  top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--amber),#f97316,#ec4899,var(--cyan));
}
.home-hero-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--amber-d);border:1px solid rgba(245,158,11,.2);
  color:var(--amber);border-radius:20px;padding:3px 10px;
  font-size:10.5px;font-weight:700;letter-spacing:.4px;
  text-transform:uppercase;margin-bottom:10px;
}
.home-hero h2{
  font-size:20px;font-weight:800;line-height:1.25;
  margin-bottom:6px;letter-spacing:-.3px;
}
.home-hero p{font-size:12.5px;color:var(--tx2);line-height:1.55}
.home-stats{
  display:flex;gap:8px;margin-top:14px;
}
.hstat{
  flex:1;background:rgba(255,255,255,.04);border:1px solid var(--line);
  border-radius:10px;padding:8px 10px;text-align:center;
}
.hstat-n{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--amber)}
.hstat-l{font-size:10px;color:var(--tx3);margin-top:2px}

.section-head{
  padding:18px 16px 8px;
  font-size:11px;font-weight:700;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--tx3);
}
.model-cards{padding:0 14px;display:flex;flex-direction:column;gap:10px}
.mcard{
  background:var(--ink2);border:1px solid var(--line);
  border-radius:16px;padding:16px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:all .18s;
  -webkit-user-select:none;user-select:none;
  position:relative;overflow:hidden;
}
.mcard::before{
  content:'';position:absolute;
  top:0;left:0;bottom:0;width:3px;
  background:var(--c);border-radius:3px 0 0 3px;
}
.mcard:active{transform:scale(.985);background:var(--ink3)}
.mcard-icon{
  width:46px;height:46px;border-radius:14px;
  background:rgba(255,255,255,.05);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.mcard-body{flex:1;min-width:0}
.mcard-name{font-size:14.5px;font-weight:700;margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mcard-meta{font-size:11.5px;color:var(--tx2)}
.mcard-meta span{color:var(--c);font-weight:600}
.mcard-arrow{
  width:30px;height:30px;border-radius:8px;
  background:rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--tx3);flex-shrink:0;
}

/* ── MODEL SCREEN ── */
#modelScreen{display:none;flex-direction:column;height:100%}
#modelScreen.vis{display:flex}

.q-list{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.qcard{
  background:var(--ink2);border:1px solid var(--line);
  border-radius:14px;overflow:hidden;
  transition:border-color .15s;
}
.qcard.essay-q{border-color:rgba(6,214,199,.15)}
.qcard-head{
  display:flex;align-items:flex-start;gap:11px;
  padding:13px 14px;cursor:pointer;
  -webkit-user-select:none;user-select:none;
}
.qcard-head:active{background:rgba(255,255,255,.03)}
.q-badge-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.qn{
  width:30px;height:30px;border-radius:8px;
  background:var(--ink3);border:1px solid var(--line2);
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;font-size:11px;font-weight:700;
  color:var(--tx2);flex-shrink:0;
}
.qn.e{color:var(--cyan);border-color:rgba(6,214,199,.25);background:rgba(6,214,199,.06)}
.qtype{
  font-size:8.5px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;padding:2px 6px;border-radius:4px;
}
.qtype-m{background:var(--amber-d);color:var(--amber)}
.qtype-e{background:var(--cyan-d);color:var(--cyan)}
.qcard-body{flex:1;min-width:0}
.qcard-txt{font-size:13.5px;line-height:1.6;color:var(--tx)}
.qcard-opts{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.qopt{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 10px;background:var(--ink3);border:1px solid var(--line);
  border-radius:8px;font-size:12px;line-height:1.4;color:var(--tx2);
}
.qopt-l{
  flex-shrink:0;font-family:'Space Mono',monospace;
  font-size:10px;font-weight:700;color:var(--tx3);
  background:rgba(255,255,255,.06);border-radius:4px;
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
}
.qcard-chevron{
  font-size:13px;color:var(--tx3);flex-shrink:0;
  margin-top:8px;transition:transform .2s;
}
.qcard.open .qcard-chevron{transform:rotate(180deg)}

/* AI SOLVE BUTTON */
.solve-row{padding:0 14px 12px;display:flex;gap:8px}
.solve-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  padding:11px;border-radius:11px;
  background:var(--bc,var(--amber-d));
  border:1px solid var(--bb,rgba(245,158,11,.25));
  color:var(--bt,var(--amber));
  font-family:'Sora',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .18s;letter-spacing:.1px;
  -webkit-appearance:none;
}
.solve-btn:active:not(:disabled){transform:scale(.96)}
.solve-btn:disabled{opacity:.5;cursor:not-allowed}

/* SOLUTION PANEL */
.sol-wrap{display:none;border-top:1px solid var(--line)}
.sol-wrap.open{display:block}
.sol-loading{
  display:flex;flex-direction:column;align-items:center;
  gap:10px;padding:24px;color:var(--tx2);font-size:13px;
}
.spinner{
  width:24px;height:24px;
  border:2px solid var(--line2);
  border-top-color:var(--amber);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.sol-content{padding:14px 14px 16px}
.sol-text{
  font-size:13px;line-height:1.85;color:var(--tx2);
  white-space:pre-wrap;word-break:break-word;
}
.sol-text strong{color:var(--tx)}
.ans-block{
  background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);
  border-radius:10px;padding:10px 14px;
  font-size:13.5px;color:#4ade80;font-weight:700;
  margin:8px 0;display:block;
}
.wrong-block{
  background:rgba(251,113,133,.08);border-radius:8px;
  padding:8px 12px;font-size:12px;color:#fb7185;
  margin:4px 0;display:block;
}
.chem{
  font-family:'Space Mono',monospace;font-size:11.5px;
  background:rgba(6,214,199,.1);border-radius:4px;
  padding:1px 5px;color:var(--cyan);
}
.sol-err{
  padding:14px;color:#fb7185;font-size:12.5px;
  display:flex;flex-direction:column;gap:8px;
}
.retry-btn{
  align-self:flex-start;padding:7px 14px;
  background:rgba(251,113,133,.1);border:1px solid rgba(251,113,133,.2);
  color:#fb7185;border-radius:8px;font-family:'Sora',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;
}

/* ── SEARCH SCREEN ── */
#searchScreen{display:none}
#searchScreen.vis{display:block}
.search-empty{
  display:flex;flex-direction:column;align-items:center;
  padding:60px 20px;gap:10px;color:var(--tx3);text-align:center;
}
.search-empty .e-ico{font-size:44px}
.search-empty p{font-size:13px;line-height:1.5}
.search-results{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.sr-card{
  background:var(--ink2);border:1px solid var(--line);
  border-radius:12px;padding:12px 14px;cursor:pointer;
  transition:all .15s;
}
.sr-card:active{background:var(--ink3)}
.sr-model{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.sr-text{font-size:13px;line-height:1.5;color:var(--tx)}
.sr-mark{background:rgba(245,158,11,.25);color:var(--amber);border-radius:3px;padding:0 2px}

/* ── BOTTOM TAB BAR ── */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:calc(var(--bar-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:rgba(8,12,20,.97);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--line);
  display:flex;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;cursor:pointer;
  background:none;border:none;color:var(--tx3);
  font-family:'Sora',sans-serif;font-size:10px;font-weight:600;
  transition:color .15s;padding:0;min-height:44px;
}
.tab.active{color:var(--amber)}
.tab-ico{font-size:21px;line-height:1}
.tab-dot{
  position:absolute;top:-2px;right:-4px;
  width:8px;height:8px;background:var(--amber);
  border-radius:50%;border:2px solid var(--ink);
  display:none;
}
.tab-ico-wrap{position:relative;display:inline-block}

/* ── ANIMATIONS ── */
.screen-enter{animation:slideIn .22s cubic-bezier(.4,0,.2,1)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
.screen-exit{animation:slideOut .18s cubic-bezier(.4,0,.2,1) forwards}
@keyframes slideOut{to{transform:translateX(100%);opacity:0}}

/* ── NO RESULTS ── */
.no-q{padding:40px 20px;text-align:center;color:var(--tx3);font-size:13px}

/* ── PROGRESS BAR ── */
.prog-bar{
  height:3px;background:var(--line);flex-shrink:0;
  position:relative;
}
.prog-fill{
  height:100%;background:linear-gradient(90deg,var(--amber),var(--cyan));
  transition:width .4s ease;border-radius:0 2px 2px 0;
}
</style>
</head>

<!-- BOTTOM TAB BAR -->
<nav class="tabbar">
  <button class="tab active" id="tab-home" onclick="switchTab('home')">
    <span class="tab-ico">🏠</span>Home
  </button>
  <button class="tab" id="tab-search" onclick="switchTab('search')">

    <div class="tab-ico-wrap">
      <span class="tab-ico">💡</span>

</nav>

const COLORS = ['#f59e0b','#06d6c7','#a78bfa','#fb7185','#84cc16','#38bdf8','#f97316'];
let solvedCount = 0;
const solCache = {};
const totalQs = EXAM_DATA.reduce((a,m)=>a+m.qs.length,0);
let currentModel = null;

document.getElementById('statQs').textContent = totalQs;

/* ─── ESCAPE ─── */
function esc(s){ return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''; }

/* ─── BUILD HOME ─── */
function buildHome(){
  const el = document.getElementById('modelCards');
  el.innerHTML = EXAM_DATA.map((m,i)=>{
    const c = COLORS[i%COLORS.length];
    const mcq = m.qs.filter(q=>q.ty==='mcq').length;
    const ess = m.qs.filter(q=>q.ty==='essay').length;
    const sname = m.name.replace(' (Chemistry 2026)','');
    return `<div class="mcard" style="--c:${c}" onclick="openModel(${i})">
      <div class="mcard-icon">${m.icon}</div>
      <div class="mcard-body">
        <div class="mcard-name">${sname}</div>
        <div class="mcard-meta"><span>${mcq}</span> MCQ · <span style="color:var(--cyan)">${ess}</span> Essay</div>
      </div>
      <div class="mcard-arrow">›</div>
    </div>`;
  }).join('');
}

/* ─── OPEN MODEL ─── */
function openModel(idx){
  currentModel = idx;
  const m = EXAM_DATA[idx];
  const c = COLORS[idx%COLORS.length];
  const sname = m.name.replace(' (Chemistry 2026)','');
  
  document.getElementById('topTitle').innerHTML = `${sname}<small>Model ${m.tag} · ${m.qs.length} questions</small>`;
  document.getElementById('backBtn').classList.add('vis');
  document.getElementById('qSearchBar').style.display='block';
  document.getElementById('progFill').style.width='0%';
  
  const content = document.getElementById('modelContent');
  content.innerHTML = `<div class="q-list">${m.qs.map(q=>buildQCard(m.id,q,c)).join('')}</div>`;
  content.scrollTop = 0;
  
  document.getElementById('homeScreen').style.display='none';
  const ms = document.getElementById('modelScreen');
  ms.style.display='flex';
  ms.style.flexDirection='column';
  ms.style.flex='1';
  ms.style.overflow='hidden';
  ms.classList.add('screen-enter');
  setTimeout(()=>ms.classList.remove('screen-enter'),300);
  
  updateProgress(m.id);
}

function goHome(){
  currentModel = null;
  document.getElementById('topTitle').innerHTML = 'Chemistry 2026<small>Egyptian Thanaweya Amma</small>';
  document.getElementById('backBtn').classList.remove('vis');
  document.getElementById('qSearchBar').style.display='none';
  document.getElementById('qSearch').value='';
  document.getElementById('modelScreen').style.display='none';
  document.getElementById('homeScreen').style.display='block';
}

/* ─── BUILD QUESTION CARD ─── */
function buildQCard(modelId, q, color){
  const isE = q.ty==='essay';
  const key = `${modelId}_${q.n}`;
  const bc = isE?'var(--cyan-d)':`rgba(${hexRgb(color)},.13)`;
  const bb = isE?'rgba(6,214,199,.22)':`rgba(${hexRgb(color)},.28)`;
  const bt = isE?'var(--cyan)':color;
  
  const optsHtml = (!isE && q.o && q.o.length>=2)
    ? `<div class="qcard-opts">${q.o.slice(0,4).map((o,i)=>o?`<div class="qopt"><span class="qopt-l">${'abcd'[i]}</span><span>${esc(o)}</span></div>`:'').join('')}</div>` : '';
  
  const safeT = esc(q.t);
  const safeOpts = esc(JSON.stringify(q.o||[]));
  const safeColor = esc(color);
  const safeId = esc(modelId);
  
  return `<div class="qcard${isE?' essay-q':''}" id="qcard-${key}">
    <div class="qcard-head" onclick="toggleQ('${key}')">
      <div class="q-badge-wrap">
        <div class="qn${isE?' e':''}">${q.n}</div>
        <span class="qtype ${isE?'qtype-e':'qtype-m'}">${isE?'ESS':'MCQ'}</span>
      </div>
      <div class="qcard-body">
        <div class="qcard-txt">${safeT}</div>
        ${optsHtml}
      </div>
      <div class="qcard-chevron">▾</div>
    </div>
    <div class="sol-wrap" id="sol-${key}">
      <div class="solve-row">
        <button class="solve-btn" style="--bc:${bc};--bb:${bb};--bt:${bt}"
          id="btn-${key}"
          onclick="solve('${safeId}','${q.n}',this.closest('.qcard'))">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
          Get AI Solution
        </button>
      </div>
      <div id="sol-body-${key}"></div>
    </div>
  </div>`;
}

function hexRgb(hex){ return [1,3,5].map(i=>parseInt(hex.slice(i,i+2),16)).join(','); }

/* ─── TOGGLE QUESTION ─── */
function toggleQ(key){
  const card = document.getElementById('qcard-'+key);
  const sol = document.getElementById('sol-'+key);
  const isOpen = sol.classList.contains('open');
  sol.classList.toggle('open',!isOpen);
  card.classList.toggle('open',!isOpen);
}

/* ─── SOLVE ─── */
async function solve(modelId, qNum, cardEl){
  const key = `${modelId}_${qNum}`;
  const bodyEl = document.getElementById('sol-body-'+key);
  const btn = document.getElementById('btn-'+key);
  if(!bodyEl)return;
  
  // Use cache
  if(solCache[key]){ bodyEl.innerHTML=`<div class="sol-content"><div class="sol-text">${fmt(solCache[key])}</div></div>`; return; }
  
  bodyEl.innerHTML=`<div class="sol-loading"><div class="spinner"></div><span>Generating solution…</span></div>`;
  if(btn)btn.disabled=true;
  
  // Find question data
  const model = EXAM_DATA.find(m=>m.id===modelId);
  const q = model?.qs.find(q=>q.n==qNum);
  if(!q){bodyEl.innerHTML='<div class="sol-err">Question not found</div>';return;}
  
  const optLines=(q.o||[]).filter(o=>o&&o.trim()).map((o,i)=>`(${\'abcd\'[i]}) ${o}`).join(\'\\n\');
  
  const prompt=`You are an expert Egyptian chemistry teacher for Thanaweya Amma Grade 12 Chemistry 2026.

Solve clearly and educationally:

QUESTION: ${q.t}
${optLines?\'OPTIONS:\\n\'+optLines:\'\'}

Format EXACTLY:
✅ CORRECT ANSWER: [letter (a/b/c/d) + what it says, or full answer for essay]

📐 STEP-BY-STEP SOLUTION:
[Full explanation, equations, all calculation steps]

⚗️ KEY CONCEPTS:
[Chemistry principles, formulas used]
${optLines?\'\\n❌ WHY OTHER OPTIONS ARE WRONG:\\n[Brief explanation per wrong option]\':\''}`;

  try{
    if(!navigator.onLine)throw new Error(\'No internet connection. Connect to get AI solutions.\');
    const res = await fetch(\'https://api.anthropic.com/v1/messages\',{
      method:\'POST\',
      headers:{\'Content-Type\':\'application/json\'},
      body:JSON.stringify({model:\'claude-sonnet-4-20250514\',max_tokens:1000,messages:[{role:\'user\',content:prompt}]})
    });
    const data = await res.json();
    const text = data.content?.filter(b=>b.type===\'text\').map(b=>b.text).join(\'\');
    if(!text)throw new Error(data.error?.message||\'Empty response\');
    solCache[key]=text;
    bodyEl.innerHTML=`<div class="sol-content"><div class="sol-text">${fmt(text)}</div></div>`;
    solvedCount++;
    document.getElementById('solvedPill').textContent=`${solvedCount} ✓`;
    document.getElementById('statSolved').textContent=solvedCount;
    document.getElementById('solvedDot').style.display='block';
    updateProgress(modelId);
  } catch(err){
    bodyEl.innerHTML=`<div class="sol-err">${esc(err.message)}<button class="retry-btn" onclick="solve('${modelId}','${qNum}',this.closest('.qcard'))">↺ Retry</button></div>`;
  }
  if(btn)btn.disabled=false;
}

/* ─── FORMAT SOLUTION ─── */
function fmt(text){
  return text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1,3}\s+(.+)$/gm,'<strong>$1</strong>')
    .replace(/✅([^\n]*)/g,'<span class="ans-block">✅$1</span>')
    .replace(/❌([^\n]*)/g,'<span class="wrong-block">❌$1</span>')
    .replace(/`([^`]+)`/g,'<span class="chem">$1</span>')
    .replace(/\n\n/g,'<br><br>')
    .replace(/\n/g,'<br>');
}

/* ─── PROGRESS BAR ─── */
function updateProgress(modelId){
  const m = EXAM_DATA.find(m=>m.id===modelId);
  if(!m)return;
  const solved = m.qs.filter(q=>solCache[`${modelId}_${q.n}`]).length;
  const pct = (solved/m.qs.length)*100;
  document.getElementById('progFill').style.width=pct+'%';
}

/* ─── FILTER QUESTIONS IN MODEL ─── */
function filterQuestions(q){
  q=q.toLowerCase().trim();
  document.querySelectorAll('#modelContent .qcard').forEach(el=>{
    const txt=(el.querySelector('.qcard-txt')?.textContent||'').toLowerCase();
    el.style.display=(!q||txt.includes(q))?'':'none';
  });
}

/* ─── GLOBAL SEARCH ─── */
function globalSearchFn(raw){
  const q=raw.toLowerCase().trim();
  const el=document.getElementById('searchContent');
  if(!q){
    el.innerHTML=`<div class="search-empty"><div class="e-ico">🔬</div><p>Type to search across all<br>${totalQs} exam questions</p></div>`;
    return;
  }
  const results=[];
  EXAM_DATA.forEach((m,mi)=>{
    m.qs.forEach(q2=>{
      if(q2.t.toLowerCase().includes(q)){
        results.push({m,mi,q:q2});
      }
    });
  });
  if(!results.length){
    el.innerHTML=`<div class="search-empty"><div class="e-ico">😕</div><p>No questions found for<br>"${esc(raw)}"</p></div>`;
    return;
  }
  const hi=s=>s.replace(new RegExp(raw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark class="sr-mark">${m}</mark>`);
  el.innerHTML=`<div class="search-results">${results.slice(0,60).map(({m,mi,q2:_,q})=>`
    <div class="sr-card" onclick="openModelAndScroll(${mi},'${m.id}_${q.n}')">
      <div class="sr-model" style="color:${COLORS[mi%COLORS.length]}">${m.name.replace(' (Chemistry 2026)','')}</div>
      <div class="sr-text">${hi(esc(q.t)).slice(0,160)}…</div>
    </div>`).join('')}</div>`;
}

function openModelAndScroll(mi,key){
  switchTab('home');
  setTimeout(()=>{
    openModel(mi);
    setTimeout(()=>{
      const el=document.getElementById('qcard-'+key);
      if(el){el.scrollIntoView({behavior:'smooth',block:'center'});toggleQ(key);}
    },300);
  },50);
}

/* ─── TABS ─── */
let currentTab='home';
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab)?.classList.add('active');
  
  document.getElementById('homeScreen').style.display='none';
  document.getElementById('modelScreen').style.display='none';
  document.getElementById('searchScreen').style.display='none';
  
  if(tab==='home'){
    if(currentModel!==null){
      document.getElementById('modelScreen').style.display='flex';
    } else {
      document.getElementById('homeScreen').style.display='block';
    }
    document.getElementById('tab-home').classList.add('active');
  } else if(tab==='search'){
    document.getElementById('searchScreen').style.display='block';
    setTimeout(()=>document.getElementById('globalSearch').focus(),100);
  } else if(tab==='solved'){
    showSolvedList();
  }
}

function showSolvedList(){
  const solvedQs=[];
  EXAM_DATA.forEach((m,mi)=>{
    m.qs.forEach(q=>{
      if(solCache[`${m.id}_${q.n}`]) solvedQs.push({m,mi,q});
    });
  });
  const el=document.getElementById('searchContent');
  if(!solvedQs.length){
    el.innerHTML=`<div class="search-empty"><div class="e-ico">💡</div><p>No solutions yet.<br>Tap "Get AI Solution" on any question!</p></div>`;
  } else {
    el.innerHTML=`<div class="search-results">${solvedQs.map(({m,mi,q})=>`
      <div class="sr-card" onclick="openModelAndScroll(${mi},'${m.id}_${q.n}')">
        <div class="sr-model" style="color:${COLORS[mi%COLORS.length]}">${m.name.replace(' (Chemistry 2026)','')}</div>
        <div class="sr-text">${esc(q.t).slice(0,140)}…</div>
      </div>`).join('')}</div>`;
  }
  switchTab('search');
  document.getElementById('tab-solved').classList.add('active');
  document.getElementById('tab-search').classList.remove('active');
}

/* ─── SERVICE WORKER ─── */
const SW=`const C='chem2026-v2';
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.add('/')));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{
  if(e.request.url.includes('anthropic.com')||e.request.url.includes('fonts.googleapis'))return;
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));return res;}).catch(()=>caches.match(e.request))));
});`;
if('serviceWorker' in navigator){
  const b=new Blob([SW],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(b),{scope:'/'}).catch(()=>{});
}

/* ─── INIT ─── */
buildHome();
</script>
